<div class="container mt-4">

<h2 class="mb-4">Mensajes con clientes</h2>

<div class="card">

<div class="card-body">

<div
class="border rounded p-3 mb-3"
style="height:300px; overflow-y:auto;">

<div
class="mb-2"
*ngFor="let mensaje of mensajes">

<strong>{{mensaje.usuario}}:</strong>

<span class="ms-2">
{{mensaje.texto}}
</span>

</div>

</div>

<form (ngSubmit)="enviarMensaje()">

<div class="input-group">

<input
type="text"
class="form-control"
placeholder="Responder..."
[(ngModel)]="nuevoMensaje"
name="mensaje">

<button
class="btn btn-primary"
type="submit">

Enviar

</button>

</div>

</form>

</div>

</div>

</div>
