<div class="p-4 bg-black text-light" style="min-height: 100vh;">

    <div class="mb-4">
        <h2 class="fw-bold">Mensajes de Clientes</h2>
        <p class="text-secondary">Acepta o rechaza solicitudes de comunicación</p>
    </div>

    <div class="row g-4">

        <div class="col-lg-5">
            <div class="card bg-black border border-secondary rounded-4 overflow-hidden">
                <div class="card-header bg-black border-bottom border-secondary py-3">
                    <h5 class="mb-0 fw-bold">Solicitudes</h5>
                </div>

                <div class="list-group list-group-flush" style="max-height: 600px; overflow-y: auto;">
                    <button *ngFor="let sol of solicitudes"
                        class="list-group-item list-group-item-action bg-black text-light border-bottom border-secondary p-3 text-start"
                        [ngClass]="{'border-start border-4 border-warning bg-dark': mensajeSeleccionado?.id === sol.id}"
                        (click)="seleccionarMensaje(sol)" style="cursor: pointer;">

                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <span class="fw-bold">{{sol.cliente}}</span>
                            <div class="d-flex align-items-center">
                                <small class="text-secondary me-2">{{sol.conversacion[0].tiempo}}</small>
                                <span class="badge rounded-pill border" [ngClass]="{
                        'border-warning text-warning': sol.estado === 'Pendiente', 
                        'border-success text-success': sol.estado === 'Aceptado',
                        'border-danger text-danger': sol.estado === 'Rechazado'
                        }">
                                    {{sol.estado}}
                                </span>
                            </div>
                        </div>
                        <div class="text-warning small mb-1">{{sol.asunto}}</div>
                        <div class="text-secondary small text-truncate" style="max-width: 100%;">
                            {{sol.conversacion[sol.conversacion.length - 1].texto}}
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card bg-black border border-secondary rounded-4 h-100 d-flex flex-column"
                *ngIf="mensajeSeleccionado">

                <div
                    class="card-header bg-black border-bottom border-secondary p-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h5 class="mb-0 fw-bold">{{mensajeSeleccionado.cliente}}</h5>
                        <small class="text-secondary">{{mensajeSeleccionado.email}}</small>
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-success rounded-pill px-3 d-flex align-items-center"
                            (click)="aceptarSolicitud()" *ngIf="mensajeSeleccionado.estado === 'Pendiente'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="me-2" viewBox="0 0 16 16">
                                <path
                                    d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z" />
                            </svg> Aceptar
                        </button>
                        <button class="btn btn-outline-danger rounded-pill px-3 d-flex align-items-center"
                            (click)="rechazarSolicitud()" *ngIf="mensajeSeleccionado.estado === 'Pendiente'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="me-2" viewBox="0 0 16 16">
                                <path
                                    d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                            </svg> Rechazar
                        </button>
                    </div>
                </div>

                <div class="card-body p-4 flex-grow-1" style="overflow-y: auto; max-height: 450px;">
                    <h6 class="text-warning fw-bold mb-4 border-bottom border-secondary pb-2">Asunto:
                        {{mensajeSeleccionado.asunto}}</h6>

                    <div class="d-flex flex-column gap-3">
                        <div *ngFor="let msg of mensajeSeleccionado.conversacion" class="d-flex"
                            [ngClass]="msg.emisor === 'admin' ? 'justify-content-end' : 'justify-content-start'">

                            <div class="p-3 rounded-4"
                                [ngClass]="msg.emisor === 'admin' ? 'bg-warning text-dark' : 'border border-secondary text-light'"
                                [style.background-color]="msg.emisor === 'admin' ? '#ffc107' : '#1a1a1a'"
                                style="max-width: 80%;">
                                <p class="mb-1" [ngClass]="msg.emisor === 'admin' ? 'fw-medium' : ''">{{msg.texto}}</p>
                                <div class="text-end mt-1">
                                    <small
                                        [ngClass]="msg.emisor === 'admin' ? 'text-dark opacity-75' : 'text-secondary'"
                                        style="font-size: 0.7rem;">
                                        {{msg.tiempo}}
                                    </small>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

                <div class="card-footer bg-black border-top border-secondary p-3"
                    *ngIf="mensajeSeleccionado.estado === 'Aceptado'">
                    <div class="input-group">
                        <input type="text" class="form-control bg-dark text-light border-secondary"
                            placeholder="Escribe tu respuesta..." [(ngModel)]="respuestaAdmin"
                            (keyup.enter)="enviarRespuesta()">
                        <button class="btn btn-warning d-flex align-items-center justify-content-center fw-bold px-4"
                            (click)="enviarRespuesta()">
                            Enviar
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
