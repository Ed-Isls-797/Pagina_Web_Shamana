<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- SIDEBAR ADMIN -->
    <div class="col-md-2 bg-dark border-end border-secondary text-light p-3">

      <h5 class="text-warning fw-bold mb-4">Administrador</h5>

      <ul class="nav flex-column">

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/admin/dashboard">
            Dashboard
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/admin/reservations">
            Reservaciones
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/admin/messages">
            Mensajes
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/admin/notificaciones">
            Notificaciones
          </a>
        </li>

        <li class="nav-item mb-4">
          <a class="nav-link text-light" routerLink="/admin/contenido">
            Gestión de Contenido
          </a>
        </li>

        <li class="nav-item">
          <button class="btn btn-outline-warning w-100" (click)="openLogoutModal()">
            Cerrar sesión
          </button>
        </li>

      </ul>

    </div>

    <!-- CONTENIDO -->
    <div class="col-md-10 bg-light text-dark p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>

<!-- Modal de confirmación de cierre de sesión -->
<div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showLogoutModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-0">
        <h5 class="modal-title text-warning">¿Cerrar sesión?</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeLogoutModal()"></button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro que deseas cerrar sesión?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" (click)="closeLogoutModal()">Cancelar</button>
        <button type="button" class="btn btn-warning" (click)="confirmLogout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</div>
