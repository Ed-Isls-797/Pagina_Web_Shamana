<div class="container mt-4">

<h2 class="mb-4">Solicitudes de Reservación</h2>

<div class="table-responsive">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Cliente</th>
<th>Actividad</th>
<th>Fecha</th>
<th>Hora</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let reservacion of reservaciones">

<td>{{reservacion.cliente}}</td>
<td>{{reservacion.actividad}}</td>
<td>{{reservacion.fecha}}</td>
<td>{{reservacion.hora}}</td>
<td>

<span class="badge bg-warning"
*ngIf="reservacion.estado=='Pendiente'">
Pendiente
</span>

<span class="badge bg-success"
*ngIf="reservacion.estado=='Aprobada'">
Aprobada
</span>

<span class="badge bg-danger"
*ngIf="reservacion.estado=='Rechazada'">
Rechazada
</span>

</td>

<td>

<button
class="btn btn-success btn-sm me-2"
(click)="aprobarReservacion(reservacion)">
Aprobar
</button>

<button
class="btn btn-danger btn-sm"
(click)="rechazarReservacion(reservacion)">
Rechazar
</button>

</td>

</tr>

</tbody>
</table>

</div>
</div>
