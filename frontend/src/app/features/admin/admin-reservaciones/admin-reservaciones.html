<div class="p-4 bg-black text-light" style="min-height: 100vh;">

    <div class="mb-4">
        <h2 class="fw-bold">Reservaciones</h2>
        <p class="text-secondary">Gestiona todas las reservaciones del club</p>
    </div>

    <div class="mb-4">
        <div class="input-group" style="max-width: 400px;">
            <span class="input-group-text bg-dark border-secondary text-secondary">🔍</span>
            <input type="text" class="form-control bg-dark text-light border-secondary"
                placeholder="Buscar por cliente o evento..." [(ngModel)]="searchTerm">
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle" style="background-color: transparent;">

            <thead class="text-secondary" style="font-size: 0.85rem;">
                <tr>
                    <th>CLIENTE</th>
                    <th>EVENTO</th>
                    <th>FECHA</th>
                    <th>MESA</th>
                    <th>PERSONAS</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>

            <tbody class="border-top-0">
                <tr *ngFor="let res of reservasFiltradas" class="border-bottom border-secondary">

                    <td class="py-3">
                        <div class="fw-bold text-light">{{res.cliente}}</div>
                        <div class="text-secondary small">{{res.email}}</div>
                    </td>

                    <td class="text-secondary">{{res.evento}}</td>
                    <td class="text-secondary">{{res.fecha}}</td>
                    <td class="text-secondary">{{res.mesa}}</td>
                    <td class="text-secondary">{{res.personas}}</td>

                    <td>
                        <span class="badge rounded-pill border" [ngClass]="{
                    'border-warning text-warning': res.estado === 'Pendiente', 
                    'border-success text-success': res.estado === 'Confirmado'
                  }" style="background-color: rgba(0,0,0,0.5);">
                            {{res.estado}}
                        </span>
                    </td>

                    <td>
                        <button class="btn btn-sm text-success p-0 me-3" (click)="aprobarReservacion(res.id)"
                            *ngIf="res.estado === 'Pendiente'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z" />
                            </svg>
                        </button>

                        <button class="btn btn-sm text-danger p-0" (click)="rechazarReservacion(res.id)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
                                viewBox="0 0 16 16">
                                <path
                                    d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
                            </svg>
                        </button>
                    </td>

                </tr>

                <tr *ngIf="reservasFiltradas.length === 0">
                    <td colspan="7" class="text-center text-secondary py-5">
                        No se encontraron reservaciones con ese término.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
