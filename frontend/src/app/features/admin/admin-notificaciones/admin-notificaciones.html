<div class="p-4 bg-black text-light" style="min-height: 100vh;">

    <div class="d-flex justify-content-between align-items-end mb-4 flex-wrap gap-3">
        <div>
            <h2 class="fw-bold mb-1">Notificaciones</h2>
            <p class="text-secondary m-0" *ngIf="noLeidas > 0">{{noLeidas}} notificaciones sin leer</p>
            <p class="text-secondary m-0" *ngIf="noLeidas === 0">Todas las notificaciones leídas</p>
        </div>

        <div class="d-flex gap-3">
            <button class="btn btn-outline-secondary rounded-3 text-light border-secondary d-flex align-items-center"
                (click)="marcarTodasComoLeidas()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="me-2"
                    viewBox="0 0 16 16">
                    <path
                        d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z" />
                </svg>
                Marcar todas como leídas
            </button>

            <button class="btn btn-warning fw-bold d-flex align-items-center px-4 rounded-3"
                style="box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);" (click)="abrirModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="me-2"
                    viewBox="0 0 16 16">
                    <path
                        d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z" />
                </svg>
                Crear Notificación
            </button>
        </div>
    </div>

    <div class="card bg-dark border-secondary rounded-4 overflow-hidden" style="background-color: #111 !important;">
        <div class="list-group list-group-flush">

            <div *ngFor="let noti of notificaciones; let last = last"
                class="list-group-item bg-transparent text-light p-4 border-secondary"
                [ngClass]="{'border-bottom': !last}">

                <div class="d-flex align-items-start">

                    <div class="rounded-circle d-flex justify-content-center align-items-center me-4 flex-shrink-0"
                            style="width: 45px; height: 45px;" [ngClass]="{
                    'bg-success bg-opacity-10 text-success': noti.tipo === 'pago',
                    'bg-info bg-opacity-10 text-info': noti.tipo === 'cliente',
                    'bg-primary bg-opacity-10 text-primary': noti.tipo === 'mensaje',
                    'bg-warning bg-opacity-10 text-warning': noti.tipo === 'reserva'
                }">
                        <svg *ngIf="noti.tipo === 'pago'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M4 10.781c.148 1.667 1.513 2.85 3.591 3.003V15h1.043v-1.216c2.27-.179 3.678-1.438 3.678-3.3 0-1.59-.947-2.51-2.956-3.028l-.722-.187V3.467c1.122.11 1.879.714 2.07 1.616h1.47c-.166-1.6-1.54-2.748-3.54-2.875V1H7.591v1.233c-1.939.23-3.27 1.472-3.27 3.156 0 1.454.966 2.483 2.661 2.917l.61.162v4.031c-1.149-.17-1.94-.8-2.131-1.718H4zm3.391-3.836c-1.043-.263-1.6-.825-1.6-1.616 0-.944.704-1.641 1.8-1.828v3.495l-.2-.05zm1.591 1.872c1.287.323 1.852.859 1.852 1.769 0 1.097-.826 1.828-2.2 1.939V8.73l.348.086z" />
                        </svg>
                        <svg *ngIf="noti.tipo === 'cliente'" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002a.274.274 0 0 1-.014.002H7.022ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816ZM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275ZM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z" />
                        </svg>
                        <svg *ngIf="noti.tipo === 'mensaje'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-.493 3.905a21.682 21.682 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a9.68 9.68 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9.06 9.06 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105z" />
                        </svg>
                        <svg *ngIf="noti.tipo === 'reserva'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            fill="currentColor" viewBox="0 0 16 16">
                            <path
                                d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z" />
                        </svg>
                    </div>

                    <div>
                        <h6 class="fw-bold mb-1 d-flex align-items-center">
                            {{noti.titulo}}
                            <span class="ms-2 rounded-circle bg-warning"
                                style="width: 8px; height: 8px; box-shadow: 0 0 8px #ffc107;"
                                *ngIf="!noti.leida"></span>
                        </h6>
                        <p class="text-secondary mb-1" style="font-size: 0.95rem;">{{noti.mensaje}}</p>
                        <small class="text-secondary" style="font-size: 0.8rem; opacity: 0.7;">{{noti.tiempo}}</small>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade show" tabindex="-1"
    style="display: block; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);" *ngIf="showModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-light border border-secondary"
            style="background-color: #0d0d0d; border-radius: 16px;">

            <div class="modal-header border-0 pb-0 mt-2 mx-2">
                <h4 class="modal-title fw-bold">Crear Notificación</h4>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
            </div>

            <div class="modal-body p-4">

                <div class="mb-3">
                    <label class="form-label text-secondary small mb-1">Título</label>
                    <input type="text" class="form-control bg-transparent text-light border-secondary"
                        placeholder="Ej: Nuevo código de descuento" [(ngModel)]="nuevoTitulo">
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary small mb-1">Tipo de Notificación</label>
                    <select class="form-select bg-transparent text-light border-secondary" [(ngModel)]="nuevoTipo">
                        <option value="mensaje" class="bg-dark">💬 Mensaje / General</option>
                        <option value="cliente" class="bg-dark">👥 Cliente</option>
                        <option value="pago" class="bg-dark">💲 Pago</option>
                        <option value="reserva" class="bg-dark">📅 Reservación</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small mb-1">Mensaje</label>
                    <textarea class="form-control bg-transparent text-light border-secondary" rows="3"
                        placeholder="Escribe los detalles aquí..." [(ngModel)]="nuevoMensaje"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary w-50"
                        (click)="cerrarModal()">Cancelar</button>
                    <button type="button" class="btn btn-warning w-50 fw-bold" (click)="crearNotificacion()"
                        [disabled]="!formularioCompleto">
                        Publicar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
