  </h2>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h6 class="text-muted">Reservaciones Totales</h6>
          <h3 class="fw-bold">{{ totalReservations }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-4">
