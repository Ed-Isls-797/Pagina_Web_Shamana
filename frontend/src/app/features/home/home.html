<div class="container py-5 text-center">
  <h1 class="display-4 text-info fw-bold">Bienvenido a Shamana</h1>
  <p class="lead">Donde la noche nunca termina.</p>

  <a routerLink="/login" class="btn btn-info btn-lg mt-3">
    Reservar ahora
  </a>
</div>
<div class="container mt-5">

<h2 class="mb-4 text-center">
Próximos Eventos
</h2>

<div class="row">

<div
class="col-md-4 mb-4"
*ngFor="let evento of eventos">

<div class="card h-100">

<img
[src]="evento.imagen"
class="card-img-top">

<div class="card-body">

<h5 class="card-title">
{{evento.titulo}}
</h5>

<p class="card-text">
{{evento.descripcion}}
</p>

</div>

</div>

</div>

</div>

</div>
