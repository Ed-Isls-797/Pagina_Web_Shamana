<div class="container-fluid">

  <h2 class="text-info fw-bold mb-4">
    Comprobantes de Pago
  </h2>

  <!-- SUBIR ARCHIVO -->

  <div class="card bg-dark border-secondary mb-4">
    <div class="card-body">

      <label class="form-label text-light">
        Subir comprobante
      </label>

      <input 
        type="file"
        class="form-control bg-black text-light border-secondary mb-3">

      <button class="btn btn-info" (click)="openUploadModal()">
        Subir comprobante
      </button>

    </div>
  </div>

  <!-- Modal para subir comprobante -->
  <div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showUploadModal">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header border-0">
          <h5 class="modal-title text-info">Comprobante subido</h5>
          <button type="button" class="btn-close btn-close-white" (click)="closeUploadModal()"></button>
        </div>
        <div class="modal-body">
          <p>Tu comprobante ha sido enviado correctamente.</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-info" (click)="closeUploadModal()">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORIAL -->

  <div class="card bg-dark border-secondary">
    <div class="card-body">

      <table class="table table-dark table-striped">

        <thead>
          <tr>
            <th>Fecha</th>
            <th>Monto</th>
          </tr>
        </thead>

        <tbody>

          @for (receipt of receipts; track $index) {

            <tr>
              <td>{{ receipt.date }}</td>
              <td>$ {{ receipt.amount }}</td>
            </tr>

          }

        </tbody>

      </table>

    </div>
  </div>

</div>
