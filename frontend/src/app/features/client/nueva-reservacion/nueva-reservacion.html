<div class="fondo-modal">
  <div class="card-neon-cyan p-4 p-md-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="text-white fw-bold m-0">Nueva Reservación</h4>
      <button class="btn-close btn-close-white" (click)="cancelar()"></button>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Nombre *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path
            d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4Z" />
        </svg>
        <input type="text" class="form-control input-dark w-100" placeholder="Tu nombre" [(ngModel)]="form.nombre"
          name="nombre">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Fecha Disponible *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor">
          <path
            d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z" />
        </svg>
        <select class="form-control input-dark w-100" [(ngModel)]="form.fecha" name="fecha">
          <option value="">Selecciona una fecha</option>
          <option *ngFor="let fecha of fechasDisponibles" [value]="fecha">
            {{ fecha }}
          </option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Número de Personas *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor">
          <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Z" />
        </svg>
        <input type="number" class="form-control input-dark w-100" placeholder="Ej: 4" min="1"
          [(ngModel)]="form.personas" name="personas">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Zona *</label>
      <select class="form-control input-dark w-100" [(ngModel)]="form.zona" name="zona">
        <option value="">Selecciona una zona</option>
        <option value="General">General</option>
        <option value="VIP">VIP</option>
        <option value="Terraza">Terraza</option>
      </select>
    </div>

    <div class="d-flex gap-3 mt-4">
      <button class="btn btn-cancel flex-grow-1 fw-bold" (click)="cancelar()">
        Cancelar
      </button>
      <button class="btn btn-cyan flex-grow-1 fw-bold" (click)="guardarReserva()">
        Confirmar Reservación
      </button>
    </div>

  </div>
</div>
