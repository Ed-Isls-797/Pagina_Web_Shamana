<div class="fondo-modal">
  <div class="card-neon-cyan p-4 p-md-5">

    <div class="d-flex justify-content-between align-items-center mb-4 pb-2">
      <h4 class="text-white fw-bold m-0 fs-5">Nueva Reservación</h4>
      <button class="btn-close btn-close-white opacity-50" (click)="cancelar()" style="font-size: 0.75rem;"></button>
    </div>

    <div class="mb-4">
      <label class="form-label small mb-2" style="color: #a1a1aa;">Nombre *</label>
      <div class="input-group-custom">
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
          </svg>
        </div>
        <input type="text" class="input-dark" placeholder="Tu nombre" [(ngModel)]="form.nombre">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label small mb-2" style="color: #a1a1aa;">Fecha Disponible *</label>
      <div class="input-group-custom">
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
          </svg>
        </div>
        <select class="input-dark" [(ngModel)]="form.fecha">
          <option value="">Selecciona una fecha</option>
          <option *ngFor="let fecha of fechasDisponibles" [value]="fecha">{{ fecha }}</option>
        </select>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label small mb-2" style="color: #a1a1aa;">Número de Personas *</label>
      <div class="input-group-custom">
        <div class="input-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002a.274.274 0 0 1-.014.002H7.022ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-1.01.377-2.042 1.09-2.904.243-.294.526-.569.846-.816ZM4.92 10A5.493 5.493 0 0 0 4 13H1c0-.26.164-1.03.76-1.724.545-.636 1.492-1.256 3.16-1.275ZM1.5 5.5a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm3-2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/>
          </svg>
        </div>
        <input type="number" class="input-dark" placeholder="Ej: 4" min="1" [(ngModel)]="form.personas">
      </div>
    </div>

    <div class="mb-5">
      <label class="form-label small mb-2" style="color: #a1a1aa;">Tipo de Mesa *</label>
      <div class="input-group-custom">
        <select class="input-dark ps-3" [(ngModel)]="form.zona">
          <option value="">Selecciona una mesa</option>
          <option value="General">General</option>
          <option value="VIP">VIP</option>
          <option value="Terraza">Terraza</option>
        </select>
      </div>
    </div>

    <div class="d-flex gap-3 mt-2">
      <button class="btn btn-cancel" (click)="cancelar()">Cancelar</button>
      <button class="btn btn-cyan" (click)="guardarReserva()">Confirmar Reservación</button>
    </div>

  </div>
</div>

<div class="toast-neutron" [ngClass]="{'show-toast': toastVisible}">
    <div class="d-flex align-items-center bg-black border border-info px-3 py-2" style="border-radius: 12px; min-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.8);">
        <div class="bg-white rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 26px; height: 26px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#000" viewBox="0 0 16 16">
                <path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425a.267.267 0 0 1 .02-.022z" />
            </svg>
        </div>
        <span class="text-white fw-bold m-0" style="font-size: 0.95rem;">{{toastMensaje}}</span>
    </div>
</div>
