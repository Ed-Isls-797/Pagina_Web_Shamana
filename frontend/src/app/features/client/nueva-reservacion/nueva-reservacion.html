<div class="fondo-modal">
  <div class="card-neon-cyan p-4 p-md-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="text-white fw-bold m-0">Nueva Reservación</h4>
      <button class="btn-close btn-close-white" (click)="cancelar()"></button>
    </div>

    <!-- NOMBRE -->
    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Nombre *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4Z"/>
        </svg>
        <input type="text"
               class="form-control input-dark w-100"
               placeholder="Tu nombre"
               [(ngModel)]="form.nombre"
               name="nombre">
      </div>
    </div>

    <!-- FECHA DISPONIBLE (Desde slots del admin) -->
    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Fecha Disponible *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
        </svg>
        <select class="form-control input-dark w-100"
                [(ngModel)]="form.slotId"
                (ngModelChange)="onSlotChange()"
                name="slotId">
          <option value="">Selecciona una fecha</option>
          <option *ngFor="let slot of slotsDisponibles"
                  [value]="slot._id">
            {{ slot.fecha }} - {{ slot.hora }} ({{ slot.zona }})
          </option>
        </select>
      </div>
      <div class="text-secondary small mt-1" *ngIf="slotsDisponibles.length === 0">
        No hay fechas disponibles por el momento.
      </div>
    </div>

    <!-- PERSONAS -->
    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Número de Personas *</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8Z"/>
          <path d="M7.022 13h7.956a.274.274 0 0 0 .014-.002l.008-.002c-.002-.264-.167-1.03-.76-1.72C13.688 10.629 12.718 10 11 10c-1.717 0-2.687.63-3.24 1.276-.593.69-.758 1.457-.76 1.72l.008.002a.274.274 0 0 0 .014.002ZM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
        </svg>
        <input type="number"
               class="form-control input-dark w-100"
               placeholder="Ej: 4"
               min="1"
               [(ngModel)]="form.personas"
               name="personas">
      </div>
    </div>

    <!-- ZONA (Auto-llenado) -->
    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Zona</label>
      <div class="input-with-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
        </svg>
        <input type="text"
               class="form-control input-dark w-100"
               [value]="slotSeleccionado?.zona || 'Se asigna al seleccionar fecha'"
               disabled
               style="opacity: 0.7;">
      </div>
    </div>

    <!-- BOTONES -->
    <div class="d-flex gap-3 mt-4">
      <button class="btn btn-cancel flex-grow-1 fw-bold"
              (click)="cancelar()">
        Cancelar
      </button>
      <button class="btn btn-cyan flex-grow-1 fw-bold"
              (click)="guardarReserva()"
              [disabled]="!form.nombre || !form.slotId">
        Confirmar Reservación
      </button>
    </div>

  </div>
</div>
