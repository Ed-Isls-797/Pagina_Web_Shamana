<div class="container mt-5 text-white">

  <div class="card bg-dark border-secondary shadow-lg p-4">

    <h3 class="text-info mb-4 text-center">
      Nueva Reservación
    </h3>

    <form (ngSubmit)="guardarReserva()">

      <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date"
               [(ngModel)]="reserva.date"
               name="date"
               class="form-control"
               required>
      </div>

      <div class="mb-3">
        <label class="form-label">Personas</label>
        <input type="number"
               [(ngModel)]="reserva.people"
               name="people"
               class="form-control"
               min="1"
               required>
      </div>

      <button class="btn btn-success w-100">
        Confirmar Reservación
      </button>

    </form>

  </div>

</div>
