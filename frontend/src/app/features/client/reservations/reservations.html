<div class="container-fluid py-4" style="background-color: #09090b; min-height: 100vh;">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="text-white fw-bold">Mis Reservaciones</h2>
    <button (click)="irNuevaReserva()" class="btn border border-secondary text-white px-4 py-2 rounded-3" style="background-color: #18181b;">
      Nueva Reserva
    </button>
  </div>

  <div class="row g-4">
    @for (res of reservations; track res.id) {
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card-reserva">
          <div class="d-flex justify-content-between mb-4">
            <span class="text-white fw-bold small">{{ res.estado || 'Pendiente' }}</span>
            <span class="text-secondary small">#{{ res.id }}</span>
          </div>
          <div class="text-center my-3">
            <h3 class="text-cyan-neon fw-bold mb-1">{{ res.fecha }}</h3>
            <span class="fecha-label">FECHA DE ACCESO</span>
          </div>
          <div class="d-flex justify-content-between mt-3 pt-3 border-top border-secondary border-opacity-25">
            <div class="text-center w-50 border-end border-secondary border-opacity-25">
              <span class="d-block text-secondary small">Personas</span>
              <div class="text-white fw-bold">{{ res.personas }}</div>
            </div>
            <div class="text-center w-50">
              <span class="d-block text-secondary small">Zona</span>
              <div class="text-white fw-bold">{{ res.zona }}</div>
            </div>
          </div>
        </div>
      </div>
    } @empty {
      <div class="col-12 text-center py-5">
        <h4 class="text-secondary">No tienes reservaciones aún</h4>
      </div>
    }
  </div>
</div>
