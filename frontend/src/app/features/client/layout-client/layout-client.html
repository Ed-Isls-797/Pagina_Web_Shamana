<div class="container-fluid px-0">

  <app-banner-notificacion tipoDestino="Cliente"></app-banner-notificacion>

  <div class="d-md-none bg-black text-light p-3 d-flex justify-content-between align-items-center border-bottom border-secondary">
    <h4 class="text-info fw-bold m-0">Cliente</h4>
    <button class="btn btn-outline-info d-flex align-items-center justify-content-center" (click)="toggleMenu()" style="width: 45px; height: 45px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z" /></svg>
    </button>
  </div>

  <div class="row g-0 min-vh-100">

    <div class="col-md-3 col-lg-2 bg-black text-light p-4 border-end border-secondary d-md-block" [class.d-none]="!isMenuOpen">
      
      <h4 class="text-info fw-bold mb-4 d-none d-md-block">Cliente</h4>
<ul class="nav flex-column gap-2">

  <li class="nav-item">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/dashboard"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Dashboard</a>
  </li>

  <li class="nav-item">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/reservations"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Reservaciones</a>
  </li>

  <li class="nav-item">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/notificaciones"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Notificaciones</a>
  </li>

  <li class="nav-item">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/productos"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Productos</a>
  </li>

  <li class="nav-item">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/messages"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Mensajes</a>
  </li>

  <li class="nav-item mb-4">
    <a class="nav-link nav-link-cliente"
       routerLink="/client/payments"
       routerLinkActive="activo-cliente"
       (click)="closeMenu()">Comprobantes</a>
  </li>

  <li class="nav-item mt-auto">
    <button class="btn btn-outline-info w-100"
            (click)="openLogoutModal(); closeMenu()">
      Cerrar sesión
    </button>
  </li>

</ul>
    </div>

    <div class="col-md-9 col-lg-10 bg-dark text-light p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>

<div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showLogoutModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light border border-info">
      <div class="modal-header border-0">
        <h5 class="modal-title text-info fw-bold">¿Cerrar sesión?</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeLogoutModal()"></button>
      </div>
      <div class="modal-body"><p>¿Estás seguro que deseas cerrar sesión?</p></div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" (click)="closeLogoutModal()">Cancelar</button>
        <button type="button" class="btn btn-info text-dark fw-bold" (click)="confirmLogout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</div>
