<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 bg-black text-light p-4 border-end border-secondary">

      <h4 class="text-info fw-bold mb-4">Cliente</h4>

      <ul class="nav flex-column">

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/client/dashboard">
            Dashboard
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/client/reservations">
            Reservaciones
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/client/messages">
            Mensajes
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link text-light" routerLink="/client/payments">
            Comprobantes
          </a>
        </li>

        <li class="nav-item mt-4">
          <button class="btn btn-outline-info w-100" (click)="openLogoutModal()">
            Cerrar sesión
          </button>
        </li>

      </ul>

    </div>

    <!-- CONTENIDO -->
    <div class="col-md-9 col-lg-10 bg-dark text-light p-4">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>

<div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showLogoutModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-0">
        <h5 class="modal-title text-info">¿Cerrar sesión?</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeLogoutModal()"></button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro que deseas cerrar sesión?</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" (click)="closeLogoutModal()">Cancelar</button>
        <button type="button" class="btn btn-info" (click)="confirmLogout()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</div>
