<div class="container-fluid">

  <!-- TÍTULO -->
  <div class="mb-4">
    <h2 class="text-info fw-bold">Panel del Cliente</h2>
    <p class="text-secondary">Resumen general de tu actividad</p>
  </div>

  <!-- CARDS -->
  <div class="row g-4">

    <div class="col-md-4">
      <div class="card bg-black text-light border border-secondary shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title text-info">Reservaciones Activas</h5>
          <h2 class="fw-bold">{{ activeReservations }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-black text-light border border-secondary shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title text-info">Mensajes Pendientes</h5>
          <h2 class="fw-bold">{{ pendingMessages }}</h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card bg-black text-light border border-secondary shadow-sm">
        <div class="card-body text-center">
          <h5 class="card-title text-info">Comprobantes Enviados</h5>
          <h2 class="fw-bold">{{ uploadedPayments }}</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- ACTIVIDAD RECIENTE -->
  <div class="mt-5">
    <h4 class="text-info mb-3">Actividad Reciente</h4>

    <ul class="list-group">
      @for (activity of recentActivity; track $index) {
  <li class="list-group-item bg-dark text-light border-secondary">
    {{ activity }}
  </li>
}
    </ul>
  </div>

</div>
