<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="card bg-dark text-light shadow-lg border border-secondary" style="width: 400px;">
    
    <div class="card-body p-4">
      
      <h3 class="text-center text-info mb-4 fw-bold">
        Acceso Shamana
      </h3>

      <form (ngSubmit)="onLogin()">

        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input 
            type="text"
            class="form-control bg-black text-light border-secondary"
            [(ngModel)]="username"
            name="username"> 
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input 
            type="password"
            class="form-control bg-black text-light border-secondary"
            [(ngModel)]="password"
            name="password"> 
        </div>

        <div class="d-grid mt-4">
          <button class="btn btn-info fw-bold">
            Ingresar
          </button>
        </div>

      </form>

      <div class="text-center mt-3">
        <small class="text-secondary">
          Usa "cliente" o "admin" como usuario
        </small>
      </div>

    </div>
  </div>

  <div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showModal">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header border-0">
          <h5 class="modal-title text-info">Aviso</h5>
          <button type="button" class="btn-close btn-close-white" (click)="closeModal()"></button>
        </div>
        <div class="modal-body">
          <p>{{ modalMessage }}</p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-info" (click)="closeModal()">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

</div>
