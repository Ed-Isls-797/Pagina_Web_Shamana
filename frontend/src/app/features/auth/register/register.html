<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card bg-dark text-light shadow-lg border border-secondary" style="width: 400px;">
    <div class="card-body p-4">
      <h3 class="text-center text-info mb-4 fw-bold">
        Registro de Cliente
      </h3>
      <form (ngSubmit)="onRegister()">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control bg-black text-light border-secondary" [(ngModel)]="name" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control bg-black text-light border-secondary" [(ngModel)]="email" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control bg-black text-light border-secondary" [(ngModel)]="password" name="password" required>
        </div>
        <div class="d-grid mt-4">
          <button class="btn btn-info fw-bold" type="submit">
            Registrarse
          </button>
        </div>
      </form>
      <div class="text-center mt-3">
        <small class="text-secondary">
          Solo clientes pueden registrarse
        </small>
      </div>
    </div>
  </div>
</div>

<div class="modal fade show" tabindex="-1" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showRegisterModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-light">
      <div class="modal-header border-0">
        <h5 class="modal-title text-info">¡Registro exitoso!</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeRegisterModal()"></button>
      </div>
      <div class="modal-body">
        <p>Tu cuenta ha sido creada correctamente.</p>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-info" (click)="closeRegisterModal()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
