<div class="min-vh-100 d-flex justify-content-center align-items-center fondo-registro">
  <div class="capa-oscura"></div>
  <div class="card bg-black text-light p-4 p-md-5" style="width: 100%; max-width: 450px; border-radius: 24px; border: 1px solid #222; z-index: 1;">

    <div class="text-center mb-5 mt-2">
      <h2 class="fw-bold mb-2" style="font-size: 2rem;">Únete al Club</h2>
      <p class="text-secondary">Regístrate para acceso exclusivo y recompensas</p>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Nombre Completo</label>
      <div class="input-group input-dark-group">
        <span class="input-group-text border-end-0" style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3Zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
        </span>
        <input type="text" class="form-control py-2 border-start-0" placeholder="Tu nombre completo" [(ngModel)]="nombre" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px;">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label text-secondary small mb-2">Correo Electrónico</label>
      <div class="input-group input-dark-group">
        <span class="input-group-text border-end-0" style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/></svg>
        </span>
        <input type="email" class="form-control py-2 border-start-0" placeholder="correo@ejemplo.com" [(ngModel)]="correo" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px;">
      </div>
    </div>

    <div class="mb-5">
      <label class="form-label text-secondary small mb-2">Contraseña</label>
      <div class="input-group input-dark-group">
        <span class="input-group-text border-end-0" style="border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
        </span>
        
        <input [type]="mostrarPassword ? 'text' : 'password'" class="form-control py-2 border-start-0 border-end-0" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="registrarUsuario()">
        
        <span class="input-group-text border-start-0" style="border-top-right-radius: 12px; border-bottom-right-radius: 12px; cursor: pointer;" (click)="togglePassword()">
          <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
          <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="m10.79 12.912-1.614-1.615a3.5 3.5 0 0 1-4.474-4.474l-2.06-2.06C.938 6.278 0 8 0 8s3 5.5 8 5.5a7.029 7.029 0 0 0 2.79-.588zM5.21 3.088A7.028 7.028 0 0 1 8 2.5c5 0 8 5.5 8 5.5s-.939 1.721-2.641 3.238l-2.062-2.062a3.5 3.5 0 0 0-4.474-4.474L5.21 3.089z"/><path d="M5.525 7.646a2.5 2.5 0 0 0 2.829 2.829l-2.83-2.829zm4.95.708-2.829-2.83a2.5 2.5 0 0 1 2.829 2.829zm3.171 6-12-12 .708-.708 12 12-.708.708z"/></svg>
        </span>
      </div>
    </div>

    <button class="btn btn-info fw-bold" type="button" (click)="registrarUsuario()">
      Registrarse
    </button>

    <div class="text-center text-secondary">
      ¿Ya tienes cuenta? <a style="cursor: pointer;" (click)="irALogin()" class="text-neon text-decoration-none fw-bold ms-1">Inicia Sesión</a>
    </div>

  </div>
</div>

<div class="toast-error" [ngClass]="{'show-toast': toastVisible}">
  <div class="d-flex align-items-center bg-black border border-danger px-3 py-2" style="border-radius: 12px; min-width: 320px; box-shadow: 0 4px 20px rgba(220, 53, 69, 0.5);">
    <div class="bg-danger rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 26px; height: 26px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#fff" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
    </div>
    <span class="text-white fw-bold m-0" style="font-size: 0.95rem;">{{toastMensaje}}</span>
  </div>
</div>
